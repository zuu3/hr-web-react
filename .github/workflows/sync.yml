name: Sync to personal repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to personal fork
        env:
          TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          echo "Token prefix: ${TOKEN:0:4}"
          git remote add personal https://x-access-token:${TOKEN}@github.com/zuu3/hr-web-react.git
          git push personal main --force
